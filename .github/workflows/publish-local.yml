# mcon-agnum SNAPSHOT 빌드 워크플로우 [MCO-661]
# 트리거: main / develop 브랜치 push
# 동작: 모든 모듈을 빌드하여 로컬 Maven 저장소(~/mcon-maven-repo)에 배포하고
#       GitHub Actions artifact로 업로드

name: Publish SNAPSHOT

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      lib_version:
        description: '배포 버전 (기본값: 1.0.0-SNAPSHOT)'
        required: false
        default: '1.0.0-SNAPSHOT'

jobs:
  publish:
    name: Build & Publish SNAPSHOT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.lib_version || '1.0.0-SNAPSHOT' }}"
          echo "LIB_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set local Maven repo path
        run: echo "MCON_LOCAL_MAVEN_REPO=${{ github.workspace }}/build/maven-repo" >> $GITHUB_ENV

      - name: Build & publish all modules
        run: ./gradlew publishAllPublicationsToLocalDirRepository
        env:
          LIB_VERSION: ${{ env.LIB_VERSION }}
          MCON_LOCAL_MAVEN_REPO: ${{ env.MCON_LOCAL_MAVEN_REPO }}

      - name: Upload Maven artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifacts-snapshot-${{ github.sha }}
          path: build/maven-repo/
          retention-days: 7
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## SNAPSHOT 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "- **버전**: ${{ env.LIB_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **커밋**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **아티팩트**: maven-artifacts-snapshot-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

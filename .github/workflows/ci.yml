# Mcon.Agnum KMP 플랫폼 CI/CD 파이프라인
# MCO-622: Phase 1 — GitHub Actions CI + 빌드 캐시 최적화 + 환경별 빌드 설정
#
# 트리거 전략:
#   PR 오픈/업데이트  → dev 빌드 (lint + test + assembleDebug + screenshot)
#   main 브랜치 push → staging 빌드 (assembleDebugStaging)
#   v*.*.* 태그 생성 → production 빌드 (assembleRelease)

name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ────────────────────────────────────────────────
# JOB 1: Lint (ktlint + detekt)
# PR 오픈/업데이트 시 실행
# ────────────────────────────────────────────────
jobs:
  lint:
    name: "Lint (ktlint + detekt)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (빌드 캐시 40~60% 단축)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck --build-cache --parallel --continue

      - name: Run detekt
        run: ./gradlew detekt --build-cache --parallel --continue

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report-${{ github.run_number }}
          path: '**/build/reports/detekt/**'
          retention-days: 7

# ────────────────────────────────────────────────
# JOB 2: Test (allTests + koverXmlReport)
# PR 오픈/업데이트 시 실행
# ────────────────────────────────────────────────
  test:
    name: "Unit Tests + Coverage (Kover)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (빌드 캐시)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run all tests
        run: ./gradlew allTests --build-cache --parallel --continue

      - name: Generate Kover XML coverage report
        run: ./gradlew koverXmlReport --build-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: '**/build/reports/tests/**'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: '**/build/reports/kover/**'
          retention-days: 7

# ────────────────────────────────────────────────
# JOB 3: Android 빌드 (assembleDebug + APK artifact)
# PR 오픈/업데이트 시 실행
# ────────────────────────────────────────────────
  build-android:
    name: "Android Build (assembleDebug)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout (full history — versionCode 계산용)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (빌드 캐시 40~60% 단축)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK (dev 환경)
        run: ./gradlew :androidApp:assembleDebug --build-cache --parallel

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mcon-agnum-debug-${{ github.run_number }}
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: APK 크기 확인
        run: |
          APK_PATH=$(find androidApp/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -f "$APK_PATH" ]; then
            APK_SIZE_BYTES=$(stat -c%s "$APK_PATH")
            APK_SIZE_MB=$(awk "BEGIN {printf \"%.1f\", ${APK_SIZE_BYTES}/1048576}")
            echo "Debug APK 크기: ${APK_SIZE_MB}MB"
            if (( $(echo "$APK_SIZE_MB > 100" | bc -l) )); then
              echo "::warning::APK 크기 초과: ${APK_SIZE_MB}MB (권장 100MB 이하)"
            fi
          fi

# ────────────────────────────────────────────────
# JOB 4: Screenshot 테스트 (verifyPaparazziDebug)
# PR 오픈/업데이트 시 실행
# ────────────────────────────────────────────────
  screenshot-test:
    name: "Screenshot Tests (Paparazzi)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (빌드 캐시)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Paparazzi screenshot verification
        run: ./gradlew verifyPaparazziDebug --build-cache --parallel

      - name: Upload screenshot diffs (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs-${{ github.run_number }}
          path: '**/build/paparazzi/failures/**'
          retention-days: 7

# ────────────────────────────────────────────────
# JOB 5: Staging 빌드 (main 브랜치 push)
# ────────────────────────────────────────────────
  build-staging:
    name: "Staging Build (main → debugStaging)"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout (full history — versionCode 계산용)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (빌드 캐시)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build DebugStaging APK (staging 환경)
        run: ./gradlew :androidApp:assembleDebugStaging --build-cache --parallel

      - name: Upload Staging APK
        uses: actions/upload-artifact@v4
        with:
          name: mcon-agnum-staging-${{ github.run_number }}
          path: androidApp/build/outputs/apk/debugStaging/*.apk
          retention-days: 14

      - name: Staging APK 크기 및 버전 확인
        run: |
          APK_PATH=$(find androidApp/build/outputs/apk/debugStaging -name "*.apk" | head -1)
          if [ -f "$APK_PATH" ]; then
            APK_SIZE_MB=$(awk "BEGIN {printf \"%.1f\", $(stat -c%s "$APK_PATH")/1048576}")
            VERSION_CODE=$(git rev-list --count HEAD)
            echo "Staging APK 크기: ${APK_SIZE_MB}MB"
            echo "versionCode: $VERSION_CODE"
          fi

# ────────────────────────────────────────────────
# JOB 6: Production 빌드 (v*.*.* 태그 생성)
# ────────────────────────────────────────────────
  build-production:
    name: "Production Build (tag → release)"
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout (full history — versionCode 계산용)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (빌드 캐시)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode Release Keystore (Production Secret)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > androidApp/release.keystore
          echo "Release keystore 복원 완료"

      - name: Build Release APK (production 환경)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease --build-cache --parallel

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: mcon-agnum-release-${{ github.ref_name }}
          path: androidApp/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Release APK 크기 및 버전 요약
        run: |
          APK_PATH=$(find androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -f "$APK_PATH" ]; then
            APK_SIZE_MB=$(awk "BEGIN {printf \"%.1f\", $(stat -c%s "$APK_PATH")/1048576}")
            VERSION_CODE=$(git rev-list --count HEAD)
            VERSION_HASH=$(git rev-parse --short HEAD)
            echo "=== 릴리즈 빌드 요약 ==="
            echo "APK: $APK_PATH"
            echo "크기: ${APK_SIZE_MB}MB"
            echo "versionCode: $VERSION_CODE"
            echo "versionName: ${{ github.ref_name }}-${VERSION_HASH}"
            echo "태그: ${{ github.ref_name }}"
          fi
